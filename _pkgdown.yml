url: https://netify-dev.github.io/lame/
template:
  bootstrap: 5

navbar:
  structure:
    left: [overview, articles, reference]
    right: [search, github]
  components:
    overview:
      text: "Overview"
      href: articles/lame-overview.html
    articles:
      text: "Articles"
      menu:
        - text: "Getting Started"
        - text: "Quick Start"
          href: articles/lame.html
        - text: "Your First AME Model"
          href: articles/cross_sec_ame.html
        - text: "---"
        - text: "Topics"
        - text: "Longitudinal Models (Overview)"
          href: articles/lame-overview.html
        - text: "Bipartite Networks"
          href: articles/bipartite.html
        - text: "Dynamic Effects"
          href: articles/dynamic_effects.html
        - text: "Fast (MCMC-free) Estimation"
          href: articles/fast_estimation.html
        - text: "Forecasting"
          href: articles/forecasting.html

articles:
  - title: "Getting Started"
    contents:
    - lame
    - cross_sec_ame
    - lame-overview
  - title: "Topics"
    contents:
    - bipartite
    - dynamic_effects
    - fast_estimation
    - forecasting

reference:
  - title: "Model Fitting (MCMC)"
    desc: "Core Bayesian MCMC estimators for AME and LAME models"
    contents:
    - ame
    - lame
    - lame-package
    - ame_parallel
    - lame_parallel
    - lame_multi
    - lame_resume
    - ame_options

  - title: "Forecasting and Temporal Diagnostics"
    desc: "Forecasts, counterfactuals, and diagnostics for dynamic fits"
    contents:
    - gof_temporal
    - detect_change_point
    - lfo
    - forecast_pit
    - rhat_dynamic_beta
    - dynamic_beta_prior_summary
    - prediction_draws_long
    - per_actor_slopes
    - als_dynamic_beta

  - title: "Model Comparison and Posterior Diagnostics"
    desc: "Information criteria, posterior draws, and held-out evaluation"
