url: https://netify-dev.github.io/lame/
template:
  bootstrap: 5

navbar:
  structure:
    left: [overview, articles, reference]
    right: [search, github]
  components:
    overview:
      text: "Overview"
      href: articles/lame-overview.html
    articles:
      text: "Articles"
      menu:
        - text: "Getting Started"
        - text: "Quick Start"
          href: articles/lame.html
        - text: "Your First AME Model"
          href: articles/cross_sec_ame.html
        - text: "---"
        - text: "Topics"
        - text: "Longitudinal Models (Overview)"
          href: articles/lame-overview.html
        - text: "Bipartite Networks"
          href: articles/bipartite.html
        - text: "Dynamic Effects"
          href: articles/dynamic_effects.html

articles:
  - title: "Getting Started"
    contents:
    - lame
    - cross_sec_ame
    - lame-overview
  - title: "Topics"
    contents:
    - bipartite
    - dynamic_effects

reference:
  - title: "Model Fitting"
    desc: "Core functions for fitting AME and LAME models"
    contents:
    - ame
    - lame
    - lame-package
    - ame_parallel
    - ame_options

  - title: "S3 Methods"
    desc: "Standard R methods for model objects"
    contents:
    - coef.ame
    - vcov.ame
    - confint.ame
    - predict.ame
    - predict.lame
    - fitted.ame
    - fitted.lame
    - residuals.ame
    - residuals.lame
    - simulate.ame
    - simulate.lame
    - summary.ame
    - summary.lame
    - print.ame
    - print.lame
    - print.summary.ame
    - print.summary.lame
    - plot.ame
    - plot.lame

  - title: "Visualization"
    desc: "Plotting functions for diagnostics and model exploration"
    contents:
    - trace_plot
    - gof_plot
    - ab_plot
    - uv_plot

  - title: "Goodness of Fit"
    desc: "Posterior predictive checks and GOF statistics"
    contents:
    - gof
    - gof_stats
    - gof_stats_unipartite
    - gof_stats_bipartite
    - compute_gof_bipartite

  - title: "Latent Space"
    desc: "Extract and align latent positions"
    contents:
    - latent_positions
    - procrustes_align

  - title: "Posterior Utilities"
    desc: "Tools for working with posterior samples"
    contents:
    - simulate_posterior
    - posterior_quantiles
    - posterior_options
    - reconstruct_EZ
    - reconstruct_UVPM
    - combine_ame_chains
    - compute_mcmc_diagnostics

  - title: "Simulation"
    desc: "Simulate network data from fitted models"
    contents:
    - print.ame.sim
    - summary.ame.sim
    - summary.lame.sim
    - simY_nrm
    - simY_bin
    - simY_ord
    - simY_pois
    - simY_tob
    - simY_frn
    - simY_rrl
    - simZ

  - title: "Data Manipulation"
    desc: "Convert between network data formats"
    contents:
    - el2sm
    - sm2el
    - array_to_list
    - list_to_array
    - list_to_array_bipartite
    - check_format
    - zscores

  - title: "Memory and Performance"
    desc: "Manage memory usage in large models"
    contents:
    - compact_ame
    - ame_memory_usage
    - ame_memory_settings

  - title: "MCMC Samplers"
    desc: "Gibbs sampling functions for latent variables, regression coefficients, and variance components"
